services:

  redis_db:
    image: redis:7-alpine
    container_name: no_lights_redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres_db:
    image: postgis/postgis:16-3.4-alpine
    container_name: no_lights_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: nolights
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data:Z
      # init.sql se ejecuta una sola vez al crear el volumen
      - ./src/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:Z
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d nolights"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: no_lights_backend
    restart: unless-stopped
    depends_on:
      redis_db:
        condition: service_healthy
      postgres_db:
        condition: service_healthy
    environment:
      REDIS_HOST: redis_db
      REDIS_PORT: "6379"
      SEARCH_RADIUS_KM: ${SEARCH_RADIUS_KM}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres_db:5432/nolights
      TELEGRAM_TOKEN: ${TELEGRAM_TOKEN}
    ports:
      - "8000:8000"
    volumes:
      - ./src/backend:/app:Z

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: no_lights_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_MAPBOX_TOKEN: ${VITE_MAPBOX_TOKEN}
    ports:
      - "3000:3000"
    volumes:
      - ./src/frontend:/app:Z
      - frontend_node_modules:/app/node_modules

  telegram_bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    container_name: no_lights_bot
    restart: unless-stopped
    depends_on:
      postgres_db:
        condition: service_healthy
    environment:
      TELEGRAM_TOKEN: ${TELEGRAM_TOKEN}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres_db:5432/nolights
    volumes:
      - ./src/bot:/app:Z

volumes:
  frontend_node_modules:
  postgres_data:
